<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - 宝宝学写字</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FDF5E6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 20px;
    }
    p {
      color: #666;
      margin-bottom: 30px;
    }
    button {
      padding: 12px 24px;
      background: #F4A460;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      cursor: pointer;
    }
    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>当前处于离线模式</h1>
  <p>请检查网络连接，或查看已缓存的汉字</p>
  <button onclick="history.back()">返回上页</button>
</body>
</html>
